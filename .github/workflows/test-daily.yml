name: Daily Test Run
on:
  push:
    branches:
      - github-actions-test
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
jobs:
  test-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      - name: Download previous data
        uses: actions/download-artifact@v4
        with:
          name: run-data
          path: ./data
        continue-on-error: true
      - name: Check for previous runs
        run: |
          mkdir -p ./data
          if [ -f "./data/last_run.txt" ]; then
            echo "Previous run data found:"
            cat ./data/last_run.txt
          else
            echo "No previous run data found"
          fi
      - name: Run test script
        run: |
          python github-actions-test/test_run.py
          mkdir -p ./data
          cp last_run.txt ./data/
      - name: Upload run data
        uses: actions/upload-artifact@v4
        with:
          name: run-data
          path: ./data
          retention-days: 7
      - name: Output run logs
        run: |
          echo "Test run complete. Check the logs above for details."